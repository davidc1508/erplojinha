services:
  postgres:
    image: postgres:16-alpine
    container_name: lojinha-postgres
    environment:
      POSTGRES_DB: lojinha
      POSTGRES_USER: lojinha
      POSTGRES_PASSWORD: lojinha123
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lojinha -d lojinha']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lojinha-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Lojinha.Api/Dockerfile
    container_name: lojinha-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=lojinha;Username=lojinha;Password=lojinha123
      ConnectionStrings__Redis: redis:6379,abortConnect=false
      Jwt__Issuer: Lojinha.Api
      Jwt__Audience: Lojinha.Web
      Cors__AllowedOrigins__0: http://localhost:4173
    ports:
      - '8080:8080'
    secrets:
      - jwt_key
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail --silent http://localhost:8080/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: src/lojinha-web/Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: lojinha-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '4173:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  redis-data:

secrets:
  jwt_key:
    file: ./docker/secrets/jwt.key